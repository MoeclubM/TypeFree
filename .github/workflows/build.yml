name: CI Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Calculate Version
        run: |
          git fetch --prune --unshallow --tags || git fetch --tags || true
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "1.0.0")
          CLEAN_TAG=${LATEST_TAG#v}
          
          if git rev-parse "$LATEST_TAG" >/dev/null 2>&1; then
            COMMITS_SINCE=$(git rev-list --count "$LATEST_TAG..HEAD" 2>/dev/null || echo "0")
          else
            COMMITS_SINCE=$(git rev-list --count HEAD 2>/dev/null || echo "0")
          fi
          
          IFS='.' read -r major minor patch <<< "$CLEAN_TAG"
          major=${major:-1}
          minor=${minor:-0}
          patch=${patch:-0}
          
          NEW_PATCH=$((patch + COMMITS_SINCE))
          VERSION_NAME="${major}.${minor}.${NEW_PATCH}"
          VERSION_CODE=$((COMMITS_SINCE + 1))
          
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "Computed Version Name: $VERSION_NAME"
          echo "Computed Version Code: $VERSION_CODE"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ env.VERSION_NAME }}
          path: app/build/outputs/apk/debug/app-debug.apk
