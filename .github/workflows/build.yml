name: CI Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Calculate Version
        run: |
          git fetch --prune --unshallow --tags || git fetch --tags || true
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.1")
          CLEAN_TAG=${LATEST_TAG#v}
          
          VERSION_NAME="${CLEAN_TAG}"
          VERSION_CODE="${{ github.run_number }}"
          CI_VERSION="${CLEAN_TAG}-${{ github.run_number }}"
          
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "CI_VERSION=$CI_VERSION" >> $GITHUB_ENV
          echo "Computed Version Name: $VERSION_NAME"
          echo "Computed Version Code: $VERSION_CODE"
          echo "Computed CI Version: $CI_VERSION"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ env.CI_VERSION }}
          path: app/build/outputs/apk/debug/app-debug.apk
